backend:
  name: github
  repo: dgrpix/blog
  branch: main
  base_url: https://api.netlify.com
  site_domain: legendary-rabanadas-ccebee.netlify.app

media_folder: static/images
public_folder: /images

collections:
  - name: posts
    label: Posts
    folder: content/posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Summary, name: summary, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - label: Polls
        name: polls
        widget: list
        required: false
        summary: "{{fields.question}}"
        fields:
          - { label: Poll ID, name: id, widget: string, hint: "Stable key (e.g. 'fav-port'). Don't change after publishing — votes are tied to it." }
          - { label: Question, name: question, widget: string }
          - label: Options
            name: options
            widget: list
            fields:
              - { label: Option ID, name: id, widget: string, hint: "Stable key (e.g. 'a', 'b', 'cozumel'). Don't change after publishing." }
              - { label: Label, name: label, widget: string }
      - label: Cover Image
        name: cover
        widget: object
        required: false
        fields:
          - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: links
    label: Link shortener
    files:
      - file: static/links/data.json
        name: links
        label: Links table
        format: json
        fields:
          - { label: Schema version, name: version, widget: hidden, default: 1 }
          - label: Links
            name: links
            widget: list
            collapsed: false
            summary: "{{fields.short}} → {{fields.target}}"
            fields:
              - label: Short
                name: short
                widget: string
                pattern: ['^(?!(settings|new|admin|api|index|data|links)$)[A-Za-z0-9_-]{4,64}$', 'Must be 4-64 chars (A-Z, a-z, 0-9, _, -); reserved words rejected']
              - label: Target URL
                name: target
                widget: string
                pattern: ['^https?://\S+$', 'Must be a valid http:// or https:// URL']
